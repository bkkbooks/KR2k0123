body:
  text: 平江記事地理類八雜記之屬提要臣等謹案平江記事一卷元髙德基撰德基平江人嘗官建德路總管其書中有記干文傳修遼金宋史事則當成於至正中矣所載皆吳郡古迹而亦兼及神仙鬼怪詼諧淫諺之事可禆圖志佚聞其間不免疏謬者如引圖經虞山者巫咸所居而不知其語出越絶書引吳越春秋稻蟹不遺種而不知其語出春秋外傳又胥蘇二字古人本通用故國語史記皆作姑蘇而以為後人之訛字凡此皆失於考證然而序次詳贍條理秩然足供採擷者甚多亦龔明之中吳紀聞之流亞也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9dbf170d719b3caf6ac1c56fbded6f53011be948d0b99c112f00b9f255e84f36
