body:
  text: 平江記事元髙德基撰虎丘初名海湧吳王闔閭葬其下池廣六十步水深一丈五尺銅棺三重澒池六尺玉鳬之流扁諸之劒三千槃郢魚腸之劒在焉發卒六十萬人治之葬三日白虎蹲其上故名虎丘舊傳又云秦始皇帝因循海右自滬瀆經此山欲發王墳取其寶鍔忽有白虎出而拒之始皇帝挺劔刺虎虎奔去不見乃改兹名山去吳縣西九里二百步高一百三十丈周二百一十丈東晉成帝咸和二年二月二十五日獻穆王珣同弟中書令珉捨宅為寺始則一山中分二寺就劔池東西建之宋初合為一寺山在寺中門垣環繞包羅勝槩先入寺門而後登山故張籍有詩云老僧只怕山移去日暮先教鎖寺門後人有詩云出城先見塔入寺始登山僧志閒亦云中原山寺幾多般未見將山寺裏安蓋以天下名山勝剎皆山中藏寺虎丘乃寺裏登山海內福地未嘗有也至元間雲游僧秋江月到寺題云平生只見山中寺今日來看寺裏山亦得古人餘意真娘唐時名妓也墓在虎丘劒池之西往來遊士多著篇詠惟王黃州題刻甚佳其詩云女命在乎色士命在乎才無才無色者未死如塵灰虎丘真娘墓止是空土堆香魂與膩骨消散隨黃埃何事千百年一名長在哉吳越多婦人死即藏山隈無色固無名丘塜空崔嵬惟有真娘墓客到情徘徊我是好名士為爾傾一杯我非好色者後人無相咍後來題詠甚多至德中舉子談彥良題一絶云虎丘山下塜纍纍是處松楸盡可悲何事世人偏重色真娘墓上獨題詩後人由是閣筆云哈雅平章飲食必仰首攪舌大嚼不巳或曰虎食狼餐相也余獨以為不然考之相書云食為性命之本飲食失節則氣不和舉物當徐而有序嚼物欲寬而有容食粗者多肥食細者多瘦含物不欲言食物不欲語虎啖狼食朱紫滿門昻口張吻非吏即卒食如鳥啄家道貧薄大抵食欲快而啜欲安吞不欲鳴此食之相也仰首含物磨牙攪舌非吉非祥馬嚼鼠咀貧賤餓死嚼在舌頭餓死他州後平章卒死鋒鏑之下吳中蟹味甚佳而太湖之種差大殼亦脆軟世稱湖蟹第一正月上元漁人所藏看燈蟹三四隻重一斤風味殊勝故陸龜蒙有蟹志傅子翊作蟹譜高似孫撰蟹略皆發揮蟹族之風致也大德丁未吳中蟹厄如蝗平田皆滿稻穀蕩盡吳諺有蝦荒蟹亂之說正謂此也考之吳越春秋越王勾踐召范蠡曰吾與子謀吳子曰未可也今其稻蟹不遺種其可乎蓋言蟹食稻也蟹之害稻自古為然以五行占之乃為兵象是亦披堅執鋭介甲之屬明年海賊蕭九六大肆剽掠殺人流血大德丙午七月七日醋坊橋民人王佑家酒甕忽作牛鳴聲聞百步許以物覆之則止去復鳴鳴三日乃已嘗聞釡鳴乃鐵母相感而然若甕鳴則不知其何為然也事之怪異有不可曉者此其一也太伯廟舊在閶門外錢俶移置門內避兵燹也失其創建之由至大戊申石牌巷西吳永寧家淡池得舊碑古廟事蹟具載漢明帝時太守糜豹所建池旁廟基高下尚存皆為民居分占池西大朴樹半已摧折吳城平門舊名巫門至大庚戌古濠中得石扁上有篆書巫門二字故老云巫咸商大戊時賢臣也其墓在門東北三里許故以名門巫字與平字相似後乃訛為平門考之圗經云虞山者巫咸所居是則巫咸嘗居虞山而葬於此耶胥山在吳縣西四十里吳王殺子胥投之江吳人立祠江上名其山為胥山闔閭即其山築臺以望太湖名姑胥臺下有九折路南出太湖故老云吳音謂胥為蘇今以鬚為蘇是也故謂山為蘇山臺為姑蘇臺後人號州為胥州訛為蘇州至今不能改也嘉定州去平江一百六十里鄉音與吳城尤異其並海去處號三儂之地蓋以鄉人自稱曰吾儂我儂稱他人曰渠儂你儂問人曰誰儂夜晚之間閉門之後有人叩門主人問曰誰儂外靣答曰我儂主人不知何人開門視之認其人矣乃曰却是你儂好事者遂名其處為三儂之地洞庭西山水月禪院正在縹眇峯下去吳縣百餘里創於梁天監三年舊名明月禪院大中祥符中易今名故老謂當時湖中有木牌為風浪打壞漂巨木百餘根湧至山下泛罟船鈎致之每木上刻水月二字各船以為神木捨送禪院構為大殿寺僧永照神其事遂改今名吳民舊有丁身錢歲納四十五萬有餘宋大中祥符四年詔除免之民間無計口算緡之事至大辛亥省臺復徵之吳中大譁值武宗上仙仁宗登極亟除之吳江鱸鄉亭在長橋之側宋熙寧中郎中林肇所建取陳文惠秋風斜日鱸魚鄉之句為名亭勢俯瞰太湖為江南絶勝過者多題詠之又於亭旁畫范蠡張翰陸龜䝉像謂之三高至元丙子里巫為土偶祠事之張邁過而題壁有云功迹盡高天下士豈惟吳地作三高夜夢老人與論祠事謂張陸吳産也吳人固當祀之范蠡越産與勾踐陰謀十年卒以滅吳吳之讐也吳人不當祀之子何從而附㑹之乎子之詩吾不與也搖手而去邁覺異其所言志於祠壁今剝落矣吳城𤣥妙觀玉皇閣一角忽墊計數千緡方可扶薦觀主以緣募弗就因循數年事不克舉皇慶癸丑燕山一匠者來自稱張撥天謂觀主不須拆卸惟換一小䭾梁添一斗栱即皆端正主人從之匠者挾鋸登其上斷下舊梁易以新木架栱敲擊之悉皆如舊觀主話及數年興造後官事弗絶匠者曰此必山門長短不齊也視之左實長寸餘即削去之自是官事果絶虎丘石井泉味極清冽陸羽嘗取此水烹啜世呼為陸羽泉張又新作水品以中泠為第一無錫惠山泉第二虎丘井第三惠山泉煮羊變為黑色作酒味苦虎丘泉則不然以之釀酒其味甚佳又新第之次於惠山其然否乎吳城舊傳吳王闔閭時子胥所築故名闔閭城吳越春秋謂子胥伐楚還師取丹陽及黃瀆土以築利其堅也城形如亞字世俗不知以為龜形本土城也粱龍德中錢氏加以陶甓至元三十一年重修築之甓上歲月工匠皆具蓋土壞皆澄漿為之欲其堅久故也閶門舊名閶闔門闔閭時所名也舊有重樓閣道吳之麗譙也夫差從此門出兵伐楚改為破楚門吳屬楚遂名閶門至元修曰金昌門作亭門內名金昌亭然吳人呼昌門已久不能遽改名之如故故亭亦圮焉許市去吳縣西二十五里舊傳秦始皇帝求吳王名劒白虎拒丘上帝刺之虎西走二十五里而沒地裂為池因名其地曰虎疁至南唐諱琥錢氏諱鏐遂改名許市後人訛舊音於許字加㸃水為滸市訛為墅迄今兩稱之不能辨云栁毅為洞庭龍女傳書事乃荒唐之說今吳城有栁毅橋太湖濱有栁毅泉意毅乃吳人也彼橋乃住宅之路泉乃别院之井耳井水滿而不溢大風撓之不濁久旱不耗此其異也人以為下通太湖龍宫使果有龍神宫府何不於巨浸中出入而反以此逼仄之井為通道耶荒唐之言不察其理俱不足信太伯有國自號勾吳說者云勾語辭吳音也吳者虞也太伯於此以虞志也越滅吳子孫以國為氏今吳中吳氏甚多而語音呼魚為吳卒以橫山下古吳城為魚城方言以訛傳訛有如是者皇度改元有張三郎者善弄笛八月五日夜在鶴橋上作伊州曲夜靜有老人來同坐石闌上語曰爾笛固清未能脫去塵俗為爾釐正之當熟記心毋忘可也乃指教其孔換易數字曲益清峻張更求别教一曲老人取笛自吹超出塵俗張問曲內云何老人歌曰月既明西軒琴復清寸心斗酒爭芳夜千秋萬歲同此情歌宛轉宛轉凄以哀願為星與漢光景共徘徊再歌曰悲且傷參差淚成行低紅掩翠方無色金徽玉軫為誰鏘歌宛轉宛轉怨復悲願為烟與霧氛氲共容姿張問何人所作答曰仙姝劉妙容歌也張叩何人記指答曰妙容傳我復請授其指調老人笑而起曰子凡心易忘我豈能教爾耶去數步不知其處張後以指尋其曲終不能得其高古之趣吳人自相呼為呆子又謂之蘇州呆每歲除夕羣兒繞街呼叫云賣癡呆千貫賣汝癡萬貫賣汝呆見賣儘多送要賒隨我來蓋以吳人多呆兒輩戲謔之耳吳推官嘗謂人曰某居官久深知吳風吳人尚奢爭勝所事不切廣置田宅計較微利殊不知異時反貽子孫不肖之害故人以呆目之謂之蘇州呆不亦宜乎吳俗以芒種節氣後遇壬為入梅凡十五日夏至中氣後遇庚為出梅入時三時亦十五日前五日為上時中五日為中時後五日為末時入梅有雨為梅雨暑氣鬱蒸而雨沾衣多腐爛故三月雨為迎梅五月為送梅夏至前半月為梅雨後半月為時雨遇雷電謂之斷梅入梅須防蒸濕入時宜合醬造醋之事梅雨之際必有大風連晝夜踰旬而止謂舶棹風以此自海外來舶船上禱而得之者歲以為常鄉氓不知訛此為白草風又曰拔草風云支硎山在吳縣西南二十五里晉沙門支道林嘗卓錫於此山多平石平石為硎又以支公處此故名支硎舊傳道林嘗居石室中所遺故物有木鞋鐵拄杖之屬旁有放鶴亭馬跡石皆因之得名延祐乙卯土人耕其地得小石碣刻偈云風既不來山亦不去逢羊遇狗合做一處後有小字云阿多摩偈人皆不解其說石刻見在白雲寺中崑山州國初縣也元貞初升為州州治去府城七十二里延祐中移治太倉未移之先太倉江口打碗花子遍地盛開民謡云打碗花子開今搬州縣來遷移之後常有鼠郎出沒㕔事上民復謡云黃郎屋上走州來住不久至正間果復移回玉峯舊治嘉定州治本崑山州春申鄉練祁市宋嘉定十一年六月高行孫緻立縣基於馬軍司酒坊之地十月興工十二年正月縣成國初尚為縣元貞間升為州延祐以來治中官吏多物故者家口皆不安有一客僧號知風水謂州治內尸氣動作屋鎮之乃安否則日盛一日不可救理時州主任立聞其言從之僧指治後東偏地曰此處為庫藏鎮之則吉任遂搆架閣庫於上落成後其患果息延祐改元太倉有一丐者堆髻額上身披皂衣赤腳手擕大瓢常於府水軍萬户寨及張京馬頭往來酒家乞酒度日酒醉輒奔走叫云牛來了牛來了衆人跟我去日以為常奔走叫噪凡三月餘又於寨木及人家門壁上連書火字人皆惡之或詈之或撲之者不知所往是冬海賊牛大眼烏合不逞自劉家港至太倉大肆剽掠水軍寨張京鎮人家俱被燒毁殺人橫地不可枚數人始悟昔日丐者之言吳城東禪院古佛像容貌端嚴頂珠圓徑數寸宋乾符甲午歲忽有毫光紅黃青紫頂中出現士庶觀瞻檀施山積後三日有老翁疑其怪固請梯升即佛光𦦨而窺之乃見佛像之首開一穴以手捫之有二白鼠長可尺餘自穴躍出緑光焰焰入藻井內遂得碎幡數片以紅幡映頂珠即紅光出青黃紫亦然人皆嘆息而去或曰佛金仙也而白鼠之禍作光於其頂得非金氣盛乎是後兵果作吳人製鱸魚鮓鰿子臘風味甚美所稱金虀玉膾非虛語也宋大業中以此充貢延祐以來守臣修故事偹為方物因之歲不敢缺鱸魚肉甚白雜以香柔花葉紫花緑葉白魚相間以回回豆子一息泥香杏膩拌之實珍品也鰿子魚選肥美者去頭尾潤以酥油風乾為臘亦加香料相兼他魚無可為敵回回豆子細如榛子肉味香美一息泥如地椒回回香料也崑山高一百五十丈周回八里在今松江華亭縣治西北二十三里崑山州以此山得名後割山為華亭縣移州治於州北馬鞍山之陽山高七十丈孤峯特秀極目湖海百里無所蔽歷年久逺人不知其故即呼此為崑山而忘馬鞍山之名矣山多竒石秀瑩若玉雪好事者取之以為珍玩遂名為崑山石山陽有慧聚寺依岩傍壑皆浮屠精舍雲忩霧閣層見疊出人以為真山似假山云干文傳崑山人中延祐元年鄉榜明年廷試賜同進士及第一夕夢入選掛名為長吳正官覺而笑曰此正為胡夢亂夢我吳人安得作長吳二縣正官必無此理初授官階承事郎昌國州同知益笑前夢之不足徵也次當改選乃授平江路長洲縣尹意為偶然又以為不偶然亡何改知烏程轉婺源州知州自以為前任長洲偶與夢符今已升知州安得再為吳縣正官既而調吳江州知州非吳縣也人之官祿事皆前定自已之神先已知之形諸夢寐故相報耳而文傳吳人兩為本路之官亦稀遇也後為翰林待制修遼金宋史加禮部尚書白鶴觀在吳城東北隅鶴舞橋之東宋信安郡王藏春園地至元間草石荒凉井旁大松樹獨存雲游道人張應𤣥初來結屋松下以棲身丁丑三月朔有羣鶴自東南來徘徊久之一白鶴留松上不去經歲作巢廣若酒家七石缸性若靈異清晨俯首長鳴日必有大檀越至候之以為常預偹齊供以待士衆皈依喜捨雲集應𤣥更為應鶴欲創立道觀以焚修不久物故弟子集應真承其業緣募十方卒成其事觀成鶴乃飛去遂名為白鶴觀黃窑鹽場負課甚多延祐丙辰一夕海潮暴長夜有火光熠熠數日皆然煮鹽變色如紫粉味鹹如故每鑊出鹽增常數三倍南人初恐難售皆不肯支領後見日煮數多不得已支去雜以他場白鹽貨賣日久白鹽皆變紫色入飲食中略無他故色不相染本場逋課償補皆完課完復為白色物變異也其理無可究竟王介軒名鑑字明卿真定安平人少卓異不羣長益耿介厲名節娶同郡富翁女資裝甚盛鑑悉歸之一無所留壯游燕都受學於虞邵菴之門用力於明體達用不攻詞藻朝貴薦其才行試以侍儀司舍人鑑不就曰某雖不敏安能為人所役哉即還故里益加砥礪扁所居為介軒因以自號其父擢官平江路吳縣尹某侍養終任樂吳中風土遂隱居吳城臨頓里西閉門獨處足跡不出户者二十年應門惟一婢客至輒叩鄰家貰酒酒至對客劇飲酒乾乃已家貧無擔石之儲然非其義一毫不茍取於人其介老而彌篤性嗜蟹人或餽兩蒲青願易一詩曰吾豈可以口腹害物命耶盡放之江中而償其詩徐孝祥居吳江同里雖苑屋數楹而樹石自然幽勝有田數畝足以供饘粥而已隱居好學不求仕進尚文好客客至必留飲以故歲常釀酒數石而自奉惟布衣草屨泊如也一日後園徐步見樹根一穴坍陷諦視之下有石甃啓之皆白物也乃亟掩之一毫弗取人無有知者幾三十年值至治壬戌歲大歉民不聊生孝祥曰是物當出世耶乃啓其穴物皆如故日取數錠收糴以散貧人所全活者不可勝計物盡乃已女將適人惟荆布遣之而於藏中之物錙銖無犯其子純大以明經發解官至翰林供奉樞密承㫖孝祥受封如其官壽至九十七而卒達嚕噶齊巴爾圗國公倜儻爽邁博文強記凡宴㑹以文為謔滿坐風生一日同寅後堂㑹飲僚佐願求一令以資勸酬公曰吾不讀書弗能為令但有兩字隱語請衆賢商之解者免弗解者請一巨觴衆曰如命公曰一字有四箇口字一箇十字又一字有四箇十字一箇口字在坐者皆不能解悉就飲飲竟叩之公以箸畫案上乃圖畢二字也泰定中有一道翁自稱古無極不知何許人擕一竹籠荷一竹杖來假居葑門道堂後架小室數椽栖息其中四圍上下皆以白堊塗之正中設小木榻出籠中瓢笛漁鼓之類懸壁間以書一束為枕市酒一甕置於床頭自釀自飲人有求飲搖手弗許飲竟復釀日以為常扁其室曰小小蓬居室中皎然如雪不生一蟲蚊蠅無敢入者暑月開户安眠不用帷帳猫犬至其門即俯首疾回不敢窺其內經年纍月四壁無塵人不見其揮拂或以蠨蛸之類投其中即不知其處堂主見其日坐卧室中未嘗出外緣募籠中青蚨不乏疑有妙術逼其傳授翁只大笑一夕收其所用之物不知何往明日物色追之葑門婁門盤門昌門之人皆云是日見其負籠荷杖出門去矣致和改元七月之望士人楊彥采陸升之載酒出遊蓮塘舟回日夕夜泊橫橋下月色明霽酒各半醒聞鄰船有琵琶聲意其歌姬舟也躡而窺之見燈下一姬自弄絃索二人徑往見之詢其所由答曰妾大都樂籍供奉女也從人來游江南值彼往雲間收布妾獨處此候之尚未回也二人命取舟中餕餘肴核就燈下同酌姬舉止閒雅姿色娟麗二人情動於中稍挑謔之姬亦不以為嫌求其歌以侑觴則曰妾近夕冒風喉咽失音不能奉命二人強之姬曰近日遊訪西子陳迹得古歌數首敢奉清塵不訝為荷凡一歌侑飲一觴歌曰風動荷花水殿香姑蘇臺上宴吳王西施醉舞嬌無力笑倚東忩白玉床再歌曰吳王舊國水烟空香徑無人蘭葉紅春色似憐歌舞地年年先發館娃宫又曰館娃宫外是蘇臺鬱鬱芊芊草不開無風自偃君知否西子裙裾拂過來又曰半夜娃宫作戰場血腥猶雜宴時香西施不及燒殘蠟猶為君王泣數行又曰春入長洲草又生鷓鴣飛起少人行年深不辨娃宫處夜夜蘇臺空月明又曰幾多雲樹倚青冥越焰燒來一片平此地最應沾恨血至今青草不勻生又曰舊苑荒臺楊栁新菱歌清唱不勝春只今惟有西江月曽照吳王宫裡人彥采曰歌韻悠柔含悲聳愴固云美矣苐西施乃亡人家國妖艷之流不足道也願更他曲以滌塵抱何幸如之姬更歌曰家國興亡來有以吳人何苦怨西施西拖若解亡吳國越國亡來又是誰彥采曰此言固是然皆古人陳言素所厭聞者大都才人四瀆五嶽精靈間氣之所聚㑹有何新聲傾耳一聽又歌曰家是紅羅亭上仙謫來塵世巳多年君心既逐東流水錯把無緣當有緣歌竟掀篷攬衣躍入水中彥采大驚汗背而覺一夢境也尋升之共話醉眠腳後不能寤也翌日事傳吳下花木之妖世固有之未有如平江牡丹之甚異者致和戊辰八月鐵瓶巷劉太醫家牡丹數株各色盛開開凡三度初開者若茶盂子大中間緑蕊有如神佛之狀數日乃謝第二度開者若五升竹籮花蕊成人馬形耐有半月之久第三度開者只如酒盞大其蕊細長若幡幢旗幟狀而羅衫紫與粉紅樓子甚多三日而萎觀者日數百人闌檻盡皆擁毁不可止遏童謡云牡丹紅禾苗空牡丹紫禾苗死明年明宗登極五月暴崩而廟諱乃和字也其應不爽如此天厯已已平江十字翼萬户府初搆正衙解巨木中分有天下太平之王六字其大如斗字畫相連如纚不斷衆皆以為瑞世之符識者云此木妖也是歲色哷萬户卒明年改元至順又明年有寧宗之變平江記事
