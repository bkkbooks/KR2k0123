body:
  text: 平江記事地理類八雜記之屬提要臣等謹案平江記事一巻元髙徳基撰徳基平江人嘗官建徳路總管其書中有記干文傳修遼金宋史事則當成於至正中矣所載皆呉郡古蹟而亦兼及神仙鬼怪詼諧滛諺之事可禆圖志佚聞其間不免疎謬者如引圖經虞山者巫咸所居而不知其語出越絶書引呉越春秋稻蟹不遺種而不知其語出春秋外傳又胥蘇二字古人本通用故國語史記皆作姑蘇而以為後人之訛字凡此皆失於攷證然而序次詳贍條理秩然足供採擷者甚多亦龔明之中呉紀聞之流亞也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:21f05b53a3d21275ee2c84e281cbd845979d2f6a64fbcbdd0213f80c94e77f02
